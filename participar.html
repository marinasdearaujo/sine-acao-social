<title>Participar · Sine Sessions Ação Social</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root{
    --bg:#0b0b0b; --panel:#151515; --panel-2:#1b1b1b; --panel-3:#222;
    --ink:#f3f3ee; --muted:#9a9a91; --faint:#67675e;
    --line:rgba(255,255,255,.10); --line-2:rgba(255,255,255,.2);
    --lime:#c8f000; --lime-dim:rgba(200,240,0,.13); --lime-line:rgba(200,240,0,.4);
    --amber:#f2a71b; --red:#ff6b6b;
  }
  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:17px;line-height:1.62}
  .wrap{max-width:640px;margin:0 auto;padding:0 20px}
  h1,h2,h3{font-weight:700;letter-spacing:-.01em;text-wrap:balance;margin:0}
  a{color:var(--lime)}

  .bar{position:sticky;top:0;z-index:10;background:rgba(11,11,11,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .bar .wrap{display:flex;align-items:center;justify-content:space-between;padding:12px 20px}
  .brand{display:flex;align-items:baseline;gap:8px;font-weight:800;letter-spacing:-.02em}
  .brand .w{color:var(--lime);font-size:19px}
  .brand .s{color:var(--muted);font-size:12px;font-weight:600}
  .brand .spark{color:var(--lime);font-size:12px}
  .back{font-size:13px;color:var(--muted);text-decoration:none;font-weight:600}
  .back:hover{color:var(--lime)}

  main{padding:26px 0 80px}
  .eyebrow{text-transform:uppercase;letter-spacing:.2em;font-size:11px;font-weight:800;color:var(--lime);margin-bottom:10px}

  /* list of actions */
  .lead{color:var(--muted);margin:0 0 22px}
  .clist{display:flex;flex-direction:column;gap:12px}
  .ccard{display:block;background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:20px;text-decoration:none;color:inherit;transition:border-color .12s,transform .12s}
  .ccard:hover{border-color:var(--lime-line);transform:translateY(-2px)}
  .ccard .badge{display:inline-block;font-size:12px;font-weight:800;color:#0b0b0b;background:var(--lime);border-radius:7px;padding:3px 10px;margin-bottom:10px}
  .ccard.a2 .badge{background:var(--amber)}
  .ccard h3{font-size:20px;margin-bottom:6px}
  .ccard p{margin:0;color:var(--muted);font-size:14.5px}
  .ccard .go{color:var(--lime);font-weight:700;font-size:13.5px;margin-top:12px;display:inline-block}

  /* hero */
  .hero{padding:8px 0 6px}
  .hero .badge{display:inline-block;font-size:13px;font-weight:800;color:#0b0b0b;background:var(--lime);border-radius:8px;padding:5px 12px;margin-bottom:14px}
  .hero.a2 .badge{background:var(--amber)}
  .hero h1{font-size:clamp(28px,7vw,38px);line-height:1.08;margin-bottom:12px}
  .hero .meta{display:flex;flex-wrap:wrap;gap:8px 16px;color:var(--muted);font-size:14.5px}
  .hero .meta .m{display:flex;align-items:center;gap:6px}
  .hero .meta .ic{color:var(--lime)}
  .meetbox{margin-top:16px;background:var(--lime-dim);border:1px solid var(--lime-line);border-radius:13px;padding:13px 16px}
  .meetbox .k{font-size:11px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:var(--lime)}
  .meetbox .mv{font-size:16.5px;font-weight:600;margin-top:4px}

  section{margin-top:30px}
  section h2{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);font-weight:800;margin-bottom:12px}
  .obj{font-size:17.5px;color:#e3e3db;line-height:1.55}

  /* connection manifesto */
  .manifesto{background:linear-gradient(160deg,var(--lime-dim),transparent 75%),var(--panel);
    border:1px solid var(--lime-line);border-radius:18px;padding:24px 22px;margin-top:30px}
  .manifesto .k{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:800;color:var(--lime);margin-bottom:12px}
  .manifesto p{margin:0 0 12px;font-size:18px;line-height:1.5}
  .manifesto p:last-child{margin-bottom:0}
  .manifesto b{color:var(--lime);font-weight:700}

  /* flow */
  .flow{display:flex;flex-direction:column;gap:2px}
  .frow{display:flex;gap:14px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line)}
  .frow:last-child{border-bottom:none}
  .frow .n{width:26px;height:26px;flex:none;border-radius:50%;background:var(--lime);color:#0b0b0b;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;margin-top:1px}
  .frow .t{flex:1;font-size:16px}

  /* map */
  svg.map{width:100%;aspect-ratio:100/60;display:block;background:radial-gradient(120% 120% at 50% 0%, rgba(200,240,0,.05), transparent 60%),var(--panel-2);border:1px solid var(--line);border-radius:14px}
  svg.map .grid{stroke:rgba(255,255,255,.05);stroke-width:.3}
  svg.map .route{fill:none;stroke:var(--lime);stroke-width:1.1;stroke-dasharray:2.6 2.2;stroke-linejoin:round;stroke-linecap:round;opacity:.9}
  svg.map circle.pin{fill:var(--lime);stroke:#0b0b0b;stroke-width:.6}
  svg.map text.num{fill:#0b0b0b;font-size:3.4px;font-weight:800;text-anchor:middle;dominant-baseline:central}
  svg.map text.lbl{fill:var(--ink);font-size:2.7px;font-weight:600;text-anchor:middle;paint-order:stroke;stroke:#0b0b0b;stroke-width:.7px}
  svg.map text.compass{fill:var(--faint);font-size:3.2px;font-weight:800}
  .stops{display:flex;flex-direction:column;gap:2px;margin-top:12px}
  .srow{display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
  .srow:last-child{border-bottom:none}
  .srow .n{width:22px;height:22px;flex:none;border-radius:50%;background:var(--lime-dim);border:1px solid var(--lime-line);color:var(--lime);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}
  .srow .t{flex:1;font-size:15.5px}
  .gmaps{display:inline-flex;align-items:center;gap:8px;background:var(--lime);color:#0b0b0b;border:none;border-radius:11px;padding:12px 18px;font-size:15px;font-weight:800;cursor:pointer;margin-top:16px;text-decoration:none}
  .gmaps:hover{filter:brightness(1.08)}
  .tinfo{color:var(--muted);font-size:13.5px;margin-top:10px}

  /* cuidados */
  .care{display:flex;flex-direction:column;gap:12px}
  .cbox{border:1px solid var(--line);border-radius:14px;padding:16px 18px;background:var(--panel)}
  .cbox.do{border-color:var(--lime-line)}
  .cbox.dont{border-color:rgba(255,107,107,.28)}
  .cbox .h{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .cbox.do .h{color:var(--lime)}
  .cbox.dont .h{color:var(--red)}
  .cbox ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px}
  .cbox li{display:flex;gap:10px;font-size:15px;line-height:1.45}
  .cbox li .mk{flex:none;font-weight:800}
  .cbox.do li .mk{color:var(--lime)}
  .cbox.dont li .mk{color:var(--red)}

  .remind{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px}
  .remind ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:10px}
  .remind li{display:flex;gap:11px;font-size:15.5px}
  .remind li .ic{flex:none}

  .verse{text-align:center;font-style:italic;color:#cfcfc6;margin-top:34px;font-size:16px;line-height:1.5}
  .verse .ref{display:block;font-style:normal;color:var(--faint);font-size:13px;margin-top:8px;letter-spacing:.03em}
  .foot{text-align:center;color:var(--faint);font-size:12.5px;margin-top:34px}

  .empty{color:var(--muted);text-align:center;padding:60px 0}
</style>

<div class="bar"><div class="wrap">
  <div class="brand"><span class="spark">✦</span><span class="w">sine</span><span class="s">sessions</span></div>
  <a class="back" id="backlink" href="participar.html" style="visibility:hidden">‹ voltar</a>
</div></div>

<main><div class="wrap" id="app"><div class="empty">Carregando…</div></div></main>

<script>
"use strict";
const RTDB="https://rifa-mae-default-rtdb.firebaseio.com/sine-acao-social/state.json";
const SVGNS="http://www.w3.org/2000/svg";
const app=document.getElementById("app");
const backlink=document.getElementById("backlink");
let data=null;

function params(){return new URLSearchParams(location.search);}
function el(t,c,x){const n=document.createElement(t);if(c)n.className=c;if(x!=null)n.textContent=x;return n;}
function short(t){t=(t||"").trim();return t.length<=16?t:t.slice(0,15)+"…";}

/* ---- live read ---- */
fetch(RTDB).then(r=>r.json()).then(d=>{data=d;render();}).catch(()=>{app.innerHTML='<div class="empty">Sem conexão. Tente novamente.</div>';});
try{
  const es=new EventSource(RTDB);
  const on=ev=>{try{const m=JSON.parse(ev.data);if(m&&m.path==="/"&&m.data){data=m.data;render();}else{fetch(RTDB).then(r=>r.json()).then(d=>{data=d;render();});}}catch(e){}};
  es.addEventListener("put",on);es.addEventListener("patch",on);
}catch(e){}

function render(){
  const id=params().get("a");
  if(!data||!data.actions){app.innerHTML='<div class="empty">Nada por aqui ainda.</div>';return;}
  const action=id?data.actions.find(a=>a.id===id):null;
  if(action){backlink.style.visibility="visible";renderAction(action);}
  else{backlink.style.visibility="hidden";renderList();}
}

function renderList(){
  app.innerHTML="";
  const e=el("div","eyebrow","Sine Sessions · Ação Social");app.appendChild(e);
  const h=el("h1");h.style.fontSize="26px";h.style.marginBottom="10px";h.textContent="Vem participar com a gente";app.appendChild(h);
  app.appendChild(el("p","lead","Escolha a ação para ver como vai funcionar, a rota e os cuidados."));
  const list=el("div","clist");
  data.actions.forEach(a=>{
    const c=el("a","ccard"+(a.accent==="amber"?" a2":""));c.href="participar.html?a="+encodeURIComponent(a.id);
    c.appendChild(el("span","badge",a.date||"em breve"));
    c.appendChild(el("h3",null,a.title||"Ação"));
    if(a.obj)c.appendChild(el("p",null,a.obj));
    c.appendChild(el("span","go","Ver como funciona ›"));
    list.appendChild(c);
  });
  app.appendChild(list);
}

function findSection(a,type){return (a.sections||[]).find(s=>s.type===type);}

function renderAction(a){
  app.innerHTML="";
  const hero=el("div","hero"+(a.accent==="amber"?" a2":""));
  hero.appendChild(el("span","badge",a.date||""));
  hero.appendChild(el("h1",null,a.title||""));
  const meta=el("div","meta");
  if(a.place){const m=el("div","m");m.appendChild(el("span","ic","📍"));m.appendChild(el("span",null,a.place));meta.appendChild(m);}
  if(a.when){const m=el("div","m");m.appendChild(el("span","ic","🗓"));m.appendChild(el("span",null,a.when));meta.appendChild(m);}
  hero.appendChild(meta);
  if(a.meet){const mp=el("div","meetbox");mp.innerHTML='<span class="k">🚩 Ponto de encontro</span>';mp.appendChild(el("div","mv",a.meet));hero.appendChild(mp);}
  app.appendChild(hero);

  if(a.obj){const s=el("section");s.appendChild(el("h2",null,"O que é"));s.appendChild(el("p","obj",a.obj));app.appendChild(s);}

  // connection manifesto (fixed heart of it)
  const man=el("div","manifesto");
  man.appendChild(el("div","k","O mais importante"));
  const p1=el("p");p1.innerHTML="A gente não vai só <b>entregar</b> alguma coisa. A gente vai <b>estar com</b> as pessoas.";
  const p2=el("p");p2.innerHTML="Cada parada é um encontro: chegar perto, perguntar o nome, ouvir a história, orar junto se a pessoa quiser. O que levamos abre a conversa — o que fica é o <b>tempo</b> e o <b>cuidado</b>.";
  const p3=el("p");p3.innerHTML="Uma pessoa <b>vista</b> vale mais que mil sacolas entregues com pressa.";
  man.appendChild(p1);man.appendChild(p2);man.appendChild(p3);
  app.appendChild(man);

  // como vai funcionar (guide.flow)
  const g=findSection(a,"guide");
  if(g&&g.flow&&g.flow.length){
    const s=el("section");s.appendChild(el("h2",null,"Como vai funcionar"));
    const flow=el("div","flow");
    g.flow.forEach((it,i)=>{const r=el("div","frow");r.appendChild(el("div","n",i+1));r.appendChild(el("div","t",it.t||""));flow.appendChild(r);});
    s.appendChild(flow);app.appendChild(s);
  }

  // rota
  const rt=findSection(a,"route");
  if(rt&&rt.items&&rt.items.length){
    const s=el("section");s.appendChild(el("h2",null,"A rota"));
    s.appendChild(buildMap(rt));
    const stops=el("div","stops");
    rt.items.forEach((it,i)=>{const r=el("div","srow");r.appendChild(el("div","n",i+1));r.appendChild(el("div","t",it.t||""));stops.appendChild(r);});
    s.appendChild(stops);
    const per=rt.minPer||15;
    s.appendChild(el("div","tinfo","Ficamos cerca de "+per+" min em cada parada — sem pressa. Total aproximado: "+(per*rt.items.length)+" min."));
    const gm=el("a","gmaps");gm.textContent="🧭 Abrir a rota no Google Maps";gm.target="_blank";
    const pts=rt.items.map(it=>it.t).filter(Boolean).map(n=>encodeURIComponent(n+", "+(rt.city||"Maringá, PR")));
    gm.href=pts.length?("https://www.google.com/maps/dir/"+pts.join("/")):"#";
    s.appendChild(gm);
    app.appendChild(s);
  }

  // cuidados
  if(g&&((g.faca&&g.faca.length)||(g.evite&&g.evite.length))){
    const s=el("section");s.appendChild(el("h2",null,"Cuidados"));
    const care=el("div","care");
    if(g.faca&&g.faca.length)care.appendChild(careBox("do","✓ Faça",g.faca,"✓"));
    if(g.evite&&g.evite.length)care.appendChild(careBox("dont","✕ Evite",g.evite,"✕"));
    s.appendChild(care);app.appendChild(s);
  }

  // lembretes práticos (fixos)
  const s2=el("section");s2.appendChild(el("h2",null,"Antes de ir"));
  const rem=el("div","remind");const ul=el("ul");
  [["⏰","Chegue no horário combinado do ponto de encontro."],
   ["🧥","Roupa confortável e agasalho — é inverno e ficamos na rua."],
   ["👥","Ande sempre junto do grupo ou em dupla, nunca sozinho."],
   ["🤍","Venha com o coração aberto e sem pressa. Você é presença."],
   ["📵","Celular guardado — nada de foto sem permissão da pessoa."]
  ].forEach(x=>{const li=el("li");li.appendChild(el("span","ic",x[0]));li.appendChild(el("span",null,x[1]));ul.appendChild(li);});
  rem.appendChild(ul);s2.appendChild(rem);app.appendChild(s2);

  const vs=el("div","verse");vs.innerHTML='“Tive fome, e destes-me de comer… era estrangeiro, e hospedastes-me.”<span class="ref">Mateus 25:35</span>';
  app.appendChild(vs);
  app.appendChild(el("div","foot","Sine Sessions · Ação Social"));
  window.scrollTo(0,0);
}

function careBox(cls,title,items,mk){
  const box=el("div","cbox "+cls);box.appendChild(el("div","h",title));
  const ul=el("ul");items.forEach(it=>{const li=el("li");li.appendChild(el("span","mk",mk));li.appendChild(el("span",null,it.t||""));ul.appendChild(li);});
  box.appendChild(ul);return box;
}

function buildMap(rt){
  const svg=document.createElementNS(SVGNS,"svg");svg.setAttribute("class","map");svg.setAttribute("viewBox","0 0 100 60");
  for(let gx=10;gx<100;gx+=10){const l=document.createElementNS(SVGNS,"line");l.setAttribute("class","grid");l.setAttribute("x1",gx);l.setAttribute("y1",0);l.setAttribute("x2",gx);l.setAttribute("y2",60);svg.appendChild(l);}
  for(let gy=10;gy<60;gy+=10){const l=document.createElementNS(SVGNS,"line");l.setAttribute("class","grid");l.setAttribute("x1",0);l.setAttribute("y1",gy);l.setAttribute("x2",100);l.setAttribute("y2",gy);svg.appendChild(l);}
  const comp=document.createElementNS(SVGNS,"text");comp.setAttribute("class","compass");comp.setAttribute("x",94);comp.setAttribute("y",7);comp.textContent="N↑";svg.appendChild(comp);
  const route=document.createElementNS(SVGNS,"polyline");route.setAttribute("class","route");route.setAttribute("points",rt.items.map(it=>it.x+","+it.y).join(" "));svg.appendChild(route);
  rt.items.forEach((it,i)=>{
    const c=document.createElementNS(SVGNS,"circle");c.setAttribute("class","pin");c.setAttribute("r",3.6);c.setAttribute("cx",it.x);c.setAttribute("cy",it.y);svg.appendChild(c);
    const lbl=document.createElementNS(SVGNS,"text");lbl.setAttribute("class","lbl");lbl.setAttribute("x",it.x);lbl.setAttribute("y",it.y-4.4);lbl.textContent=short(it.t);svg.appendChild(lbl);
    const num=document.createElementNS(SVGNS,"text");num.setAttribute("class","num");num.setAttribute("x",it.x);num.setAttribute("y",it.y);num.textContent=(i+1);svg.appendChild(num);
  });
  return svg;
}
</script>
